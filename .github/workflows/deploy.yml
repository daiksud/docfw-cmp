name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    strategy:
      matrix:
        include:
          - framework: nextra
            output: out
          - framework: vitepress
            output: .vitepress/dist
          # Add future frameworks here as they're built, e.g.:
          # - framework: fumadocs
          #   output: out
          # - framework: docusaurus
          #   output: build
          # - framework: vitepress
          #   output: .vitepress/dist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Nextra and VitePress read git history per content file to render
          # each page's "Last updated on" date. The default shallow clone
          # (fetch-depth: 1) has no history to read, so every page's timestamp would be
          # silently blank on the deployed site. See:
          # https://github.com/actions/checkout#fetch-all-history-for-all-tags-and-branches
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Install dependencies
        working-directory: frameworks/${{ matrix.framework }}
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: frameworks/${{ matrix.framework }}
        run: bun run build

      - name: Tag artifact with framework name
        # Makes each artifact self-describing so the deploy job can discover
        # which framework it belongs to regardless of how download-artifact
        # lays out the downloaded directories (see deploy job's "Assemble
        # site" step for details).
        working-directory: frameworks/${{ matrix.framework }}
        run: printf '%s' "${{ matrix.framework }}" > "${{ matrix.output }}/.docfw-framework"

      - name: Upload framework artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-${{ matrix.framework }}
          path: frameworks/${{ matrix.framework }}/${{ matrix.output }}
          if-no-files-found: error
          # Defensive: some frameworks' static output may include dotfiles
          # (e.g. .htaccess); this action excludes them by default.
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download all framework artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: site-*
          path: artifacts

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p _site
          cp -r landing/. _site/
          # actions/download-artifact extracts a single matched artifact flat
          # into "artifacts/" but nests 2+ matched artifacts under
          # "artifacts/<artifact-name>/" - so we can't assume a fixed
          # directory shape here. Instead, each framework's artifact is
          # self-describing (see build job's "Tag artifact with framework
          # name" step): discover framework roots by locating that marker
          # file wherever it landed.
          while IFS= read -r -d '' marker; do
            root="$(dirname "$marker")"
            framework="$(cat "$marker")"
            mkdir -p "_site/$framework"
            cp -r "$root/." "_site/$framework/"
          done < <(find artifacts -name '.docfw-framework' -print0)
          ./scripts/verify-doc-parity _site/nextra _site/vitepress
          find _site -name '.docfw-framework' -delete
          touch _site/.nojekyll
          find _site -maxdepth 2

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          # v4+ excludes dotfiles by default; _site/.nojekyll (created in the
          # "Assemble site" step above) must be preserved so GitHub Pages
          # skips Jekyll processing and serves `_next/`/`_pagefind/` as-is.
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

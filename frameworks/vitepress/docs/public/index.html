<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DocFW Comparison</title>
  </head>
  <body>
    <main>
      <p id="redirect-status" aria-live="polite">Redirecting to the documentation…</p>
      <noscript>
        <p>
          JavaScript is unavailable. Continue to the
          <a href="./en/">English documentation</a>.
        </p>
      </noscript>
    </main>
    <script>
      (function () {
        var isJapanese = /^ja(?:-|$)/i.test(navigator.language || '')
        var destination = isJapanese ? './ja/' : './en/'

        document.documentElement.lang = isJapanese ? 'ja' : 'en'
        window.location.replace(destination)
      })()
    </script>
  </body>
</html>
